<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Courier New', monospace; font-size: 12px; padding: 10px; }
      button { font-family: inherit; font-size: 12px; padding: 8px 14px; cursor: pointer; margin-bottom: 10px; }
      button:disabled { cursor: default; opacity: 0.6; }
      textarea { width: 100%; height: 320px; font-family: inherit; font-size: 11px; box-sizing: border-box; }
    </style>
  </head>
  <body>
    <button id="run">Test PLGen Connection</button>
    <textarea id="out" readonly>Click the button to run the M1 connectivity test.</textarea>

    <script>
      document.getElementById('run').addEventListener('click', function () {
        var btn = document.getElementById('run');
        var out = document.getElementById('out');
        btn.disabled = true;
        out.value = 'Running…';

        google.script.run
          .withSuccessHandler(function (result) {
            out.value = result;
            btn.disabled = false;
          })
          .withFailureHandler(function (error) {
            out.value = 'ERROR: ' + error.message;
            btn.disabled = false;
          })
          .testPlgenConnection();
      });
    </script>
  </body>
</html>
